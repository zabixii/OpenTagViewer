name: Build Patched APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Inject API Key into Java Code
        run: sed -i "s/MAPTILER_KEY_PLACEHOLDER/${{ secrets.MAPTILER_API_KEY }}/g" app/src/main/java/dev/wander/android/opentagviewer/ui/maps/MapTilerProvider.java

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OpenTagViewer-Patched
          path: app/build/outputs/apk/debug/app-debug.apk
