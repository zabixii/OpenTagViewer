name: 获取签名信息 (Get Signing Info)

on:
  workflow_dispatch: # 允许手动触发

jobs:
  get-signing-info:
    name: 生成 SHA1 指纹和包名
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: 赋予 Gradlew 执行权限
        run: chmod +x gradlew
      
      - name: 生成 Debug Keystore
        run: |
          echo "======================================"
          echo "正在生成 Debug Keystore..."
          echo "======================================"
          mkdir -p $HOME/.android
          keytool -genkey -v -keystore $HOME/.android/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          echo "✅ Debug Keystore 已生成"
          echo ""
      
      - name: 生成签名报告
        run: |
          echo "======================================"
          echo "正在生成签名报告..."
          echo "======================================"
          ./gradlew signingReport --no-daemon
      
      - name: 提取签名信息
        run: |
          echo ""
          echo "======================================"
          echo "Android 应用签名信息"
          echo "======================================"
          echo ""
          
          # 提取包名
          PACKAGE_NAME=$(grep 'namespace = ' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          echo "📦 包名 (Package Name):"
          echo "   $PACKAGE_NAME"
          echo ""
          
          # 提取 Debug SHA1
          echo "🔐 Debug SHA1 指纹:"
          DEBUG_SHA1=$(keytool -list -v -keystore $HOME/.android/debug.keystore -alias androiddebugkey -storepass android -keypass android 2>/dev/null | grep "SHA1:" | sed 's/.*SHA1: //')
          echo "   $DEBUG_SHA1"
          echo ""
          
          # 提取 SHA256（备用）
          echo "🔐 Debug SHA256 指纹:"
          DEBUG_SHA256=$(keytool -list -v -keystore $HOME/.android/debug.keystore -alias androiddebugkey -storepass android -keypass android 2>/dev/null | grep "SHA256:" | sed 's/.*SHA256: //')
          echo "   $DEBUG_SHA256"
          echo ""
          
          echo "======================================"
          
          # 保存到文件
          cat > signing-info.txt << EOF
====================================
Android 应用签名信息
====================================

包名 (Package Name):
$PACKAGE_NAME

Debug SHA1:
$DEBUG_SHA1

Debug SHA256:
$DEBUG_SHA256

====================================
EOF
          
          echo "✅ 签名信息已保存到 signing-info.txt"
      
      - name: 生成完整签名报告文件
        run: |
          ./gradlew signingReport --no-daemon > signing-report.txt 2>&1
          echo "完整的签名报告已保存到 signing-report.txt"
      
      - name: 上传签名信息
        uses: actions/upload-artifact@v4
        with:
          name: android-signing-info
          path: |
            signing-info.txt
            signing-report.txt
          retention-days: 7
      
      - name: 完成
        run: |
          echo ""
          echo "✅ 签名信息已生成"
          echo ""
          echo "可在页面顶部下载 Artifact: android-signing-info"
          echo ""

